<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: black;
        color: white;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        line-height: 1.6;
      }
      nav {
        background: greenyellow;
        padding: 1rem;
        position: sticky;
        top: 0;
        z-index: 1000;
        display: flex;
        justify-content: space-around;
        align-items: center;
      }
      .logo {
        font-weight: bold;
        font-size: 1.5rem;
        color: #000;
      }
      .nav-links {
        list-style: none;
        display: flex;
        margin: 0;
        padding: 0;
      }
      .nav-links li {
        margin: 0 15px;
      }
      .nav-links a {
        color: #000;
        text-decoration: none;
        font-weight: 500;
        transition: 0.3s;
      }
      .nav-links a:hover {
        text-transform: uppercase;
        text-decoration: underline;
      }
      .container {
        max-width: 1200px;
        margin: auto;
        padding: 20px;
      }
      h1 {
        color: aqua;
        text-align: center;
        margin-bottom: 40px;
      }
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
      }
      .gallery-item {
        overflow: hidden;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 255, 255, 0.2);
        border: 1px solid #333;
      }
      .gallery-item img {
        width: 100%;
        height: 300px;
        object-fit: cover;
        display: block;
        transition: transform 0.5s ease;
      }
      .gallery-item img:hover {
        transform: scale(1.1);
      }
      footer {
        text-align: center;
        padding: 40px;
        color: #666;
        border-top: 1px solid #333;
        margin-top: 40px;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo">OLIVIA'S STORE</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="About.html">About</a></li>
        <li><a href="Services.html">Services</a></li>
        <li><a href="Gallery.html">Gallery</a></li>
      </ul>
    </nav>

    <main class="container">
      <h1>Our Exclusive Gallery</h1>
      <div class="gallery-grid">
        <div class="gallery-item">
          <img src="img/birkin.jpg" alt="Luxury Birkin Bag" />
        </div>
        <div class="gallery-item">
          <img src="img/zashadu.jpg" alt="Zashadu Designer Bag" />
        </div>
        <div class="gallery-item">
          <img src="img/nike.jpg" alt="Nike Sneakers" />
        </div>
        <div class="gallery-item">
          <img src="img/detail.jpg" alt="Detail Africa Leather" />
        </div>
        <div class="gallery-item">
          <img src="img/puma.jpg" alt="Puma Athletic" />
        </div>
        <div class="gallery-item">
          <img src="img/rebook.jpg" alt="Reebok Classic" />
        </div>
        <div class="gallery-item">
          <img src="img/nike men.jpg" alt="Nike Men" />
        </div>
        <div class="gallery-item">
          <img src="img/new balace.jpg" alt="New Balance" />
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; 2024 Olivia's Store. All rights reserved.</p>
    </footer>
  </body>
</html>
